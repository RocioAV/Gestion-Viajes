services:
  postgres:
    image: docker.io/library/postgres:18-alpine
    container_name: gestion_viajes_db
    environment:
        POSTGRES_USER: dev_user
        POSTGRES_PASSWORD: dev_password
        POSTGRES_DB: gestion_viajes
    ports:
        - "5432:5432"
    volumes:
        - postgres_data:/var/lib/postgresql
    
volumes:
    postgres_data:
      